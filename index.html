<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김태헌 웹 명함</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="card-wrap">
      <section class="card" aria-label="김태헌 웹 명함">
        <div class="avatar" role="img" aria-label="멋진 캐릭터 얼굴 일러스트">
          <div class="hair"></div>
          <div class="hair-shine"></div>
          <div class="face">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="eyebrow left"></span>
            <span class="eyebrow right"></span>
            <span class="nose"></span>
            <span class="mouth"></span>
          </div>
          <div class="neck"></div>
          <div class="body"></div>
          <div class="tie"></div>
        </div>

        <div class="content">
          <h1 id="name">김태헌</h1>
          <p id="job" class="job">SideOnAI 대표</p>
          <p class="intro">AI와 함께 놀고 있습니다. 같이 노실 분?</p>

          <ul class="contact-list">
            <li>
              <span class="label">Email</span>
              <a id="email" href="mailto:th@sideonai.com">th@sideonai.com</a>
            </li>
            <li>
              <span class="label">Phone</span>
              <a id="phone" href="tel:01011111111">010-1111-1111</a>
            </li>
          </ul>

          <div class="actions">
            <button id="copyBtn" type="button">연락처 복사</button>
            <a
              class="linkedin-btn"
              href="https://www.linkedin.com/"
              target="_blank"
              rel="noopener noreferrer"
              >LinkedIn</a
            >
            <a
              class="youtube-btn"
              href="https://www.youtube.com/@ai-study"
              target="_blank"
              rel="noopener noreferrer"
              >YouTube</a
            >
          </div>
          <p id="toast" class="toast" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
